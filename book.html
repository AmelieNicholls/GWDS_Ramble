<div class="container page-content">
<h1 class="text-center mb-4">Book a Table</h1>

<form>
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input
    type="date"
    id="date"
    name="date"
    class="form-control"
    required>
</div>

<div class="mb-3">
<label class="form-label">Time</label>
<input
    type="time"
    id="time"
    name="time"
    class="form-control"
    step = "900"
    required>
</div>

<button type="submit" class="btn btn-primary">Submit Booking</button>
</form>
</div>

<footer class="footer text-center fixed-bottom p-4">
  <a href="book.html" class="btn btn-primary mb-3">Book a Table</a>

  <p class="footer-text">
    Email: hello@ramble.com<br>
    Phone: +44 1234 567890
  </p>

  <p class="footer-text">
    Weekdays: 17:00 - 22:00<br>
    Weekends: 11:00 - 22:00
  </p>
</footer>
