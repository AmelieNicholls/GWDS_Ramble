<!DOCTYPE html>
<html lang="en">


<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://use.typekit.net/uds7nkf.css">
<link rel="stylesheet" href="styles.css">

<link rel="icon" type="image/png" sizes="16x16" href="images/logomarks/logomark_3_web.png">
</head>


<body class="book-page">

<nav class="navbar navbar-expand-lg navbar-light fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="images/logomarks/logomark_3_web.png" alt="Logo" height="40">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link active" href="book.html">Book a Table</a></li>
        <li class="nav-item"><a class="nav-link" href="findus.html">Find Us</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="booking-hero">
    <img 
        src="images/logomarks/Hero_banner_web.jpg"
        alt="Restaurant interior"
        class="img-fluid booking-hero-image"
    >
</section>

<section class="container my-5">
    <div class="row align-items-center">

        <div class="col-12 col-lg-3 text-center mb-4 mb-lg-0">
            <img
            src="images/advertisment/POSTER_2_web.jpg"
            alt="poster 2"
            class="img-fluid decorative-image"
            >
        </div>
        <div class="col-12 col-lg-6">
            <div class="booking-form p-4 shadow-sm"> 
        <h1 class="text-center mb-4">Book a Table</h1>


<form>
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input
    type="date"
    id="date"
    name="date"
    class="form-control"
    required>
</div>

<div class="mb-3">
<label class="form-label">Time</label>
<input
    type="time"
    id="time"
    name="time"
    class="form-control"
    step = "900"
    required>
</div>

<div class="mb-3">
            <label class="form-label">Guests</label>
            <input type="number" min="1" max="8" class="form-control">
          </div>

<button type="submit" class="btn btn-primary">Book Table</button>
</form>
            </div>
        </div>

        <div class="col-12 col-lg-3 text-center mt-4 mt-lg-0">
            <img
            src="images/photos/tomsaladclose.jpeg"
            alt="Food"
            class="img-fluid decorative-image"
            >
        </div>
</div>
</section>

<footer class="footer text-center  p-4">
  <a href="book.html" class="btn btn-primary mb-3">Book a Table</a>

  <p class="footer-text">
    Email: hello@ramble.com<br>
    Phone: +44 1234 567890
  </p>

  <p class="footer-text">
    Weekdays: 17:00 - 22:00<br>
    Weekends: 11:00 - 22:00
  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script src="script.js"></script>
</body>
</html>
